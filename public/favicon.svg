<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#050509"/>
  <!-- pixel candle flame: blue core, violet body -->
  <rect x="15" y="4"  width="2" height="2" fill="#93c5fd"/>
  <rect x="14" y="6"  width="4" height="2" fill="#60a5fa"/>
  <rect x="13" y="8"  width="6" height="3" fill="#a78bfa"/>
  <rect x="14" y="11" width="4" height="2" fill="#c4b5fd"/>
  <!-- candle body -->
  <rect x="13" y="14" width="6" height="12" fill="#e4e1f5"/>
  <rect x="13" y="14" width="2" height="12" fill="#cbc6e6"/>
  <rect x="17" y="14" width="2" height="12" fill="#8c86ad"/>
  <!-- holder -->
  <rect x="11" y="26" width="10" height="2" fill="#7c3aed"/>
</svg>
